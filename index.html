<!DOCTYPE html>
<html>
<head>
<title>Diet Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e0f7fa, #fff3e0);
    text-align: center;
    padding: 10px;
}

.container {
    background: white;
    width: 95%;
    max-width: 500px;
    margin: auto;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    margin-top: 20px;
}

h1 {
    color: #333;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    background: linear-gradient(to right, #43cea2, #185a9d);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    width: 95%;
    margin-top: 8px;
    font-size: 15px;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
    text-align: center;
}

td, th {
    border: 1px solid #ddd;
    padding: 8px;
}

th {
    background: #f3f4f6;
}

tr:nth-child(even) { background: #f9f9f9; }

.bmi-good { color: green; font-weight: bold; }
.bmi-warning { color: orange; font-weight: bold; }
.bmi-risk { color: red; font-weight: bold; }

.risky-meal { color: red; font-weight: bold; }

#result {
    margin-top: 15px;
    white-space: pre-line;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

<h1>🥗 Diet Planner</h1>

<input type="text" id="name" placeholder="Your Name">
<input type="number" id="age" placeholder="Age (years)">
<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">

<select id="goal">
<option value="lose">🔥 Lose Weight</option>
<option value="gain">💪 Gain Weight</option>
<option value="maintain">⚖️ Maintain</option>
</select>

<select id="type">
<option value="veg">🥗 Veg</option>
<option value="nonveg">🍗 Non-Veg</option>
</select>

<button onclick="generatePlan()">✨ Generate My Plan</button>

<div id="result"></div>
<div id="weekly"></div>

</div>

<script>
function generatePlan() {

let name = document.getElementById("name").value;
let age = parseInt(document.getElementById("age").value);
let weight = parseFloat(document.getElementById("weight").value);
let height = parseFloat(document.getElementById("height").value);
let goal = document.getElementById("goal").value;
let type = document.getElementById("type").value;

if (!name || !age || !weight || !height) {
    document.getElementById("result").innerText = "⚠️ Please fill all details!";
    return;
}

// BMI Calculation
let bmi = (weight / ((height/100)*(height/100))).toFixed(1);
let category, colorClass;

if(bmi < 18.5) { category = "Underweight"; colorClass = "bmi-warning"; }
else if(bmi < 24.9) { category = "Normal"; colorClass = "bmi-good"; }
else if(bmi < 29.9) { category = "Overweight"; colorClass = "bmi-warning"; }
else { category = "Obese"; colorClass = "bmi-risk"; }

// Water intake
let water = (weight * 0.033).toFixed(2);
let glasses = Math.round(water / 0.25); // 250ml per glass
let waterEmoji = "💧".repeat(glasses);

// Steps + exercise (customized with age)
let steps, exercise;

if(goal === "lose"){
    if(age < 18){ steps = "8000 - 10000 steps/day"; exercise = "30-40 min cardio"; }
    else if(age <= 50){ steps = "8000 - 10000 steps/day"; exercise = "30-45 min cardio"; }
    else{ steps = "7000 - 8000 steps/day"; exercise = "20-30 min light cardio"; }
}
else if(goal === "gain"){
    if(age < 18){ steps = "5000 - 7000 steps/day"; exercise = "Strength training 30-40 min"; }
    else if(age <= 50){ steps = "5000 - 7000 steps/day"; exercise = "Strength training 45 min"; }
    else{ steps = "4000 - 6000 steps/day"; exercise = "Light strength 20-30 min"; }
}
else{ // maintain
    if(age < 18){ steps = "7000 - 9000 steps/day"; exercise = "Light workout 25-30 min"; }
    else if(age <= 50){ steps = "7000 - 9000 steps/day"; exercise = "Light workout 30 min"; }
    else{ steps = "6000 - 8000 steps/day"; exercise = "Light activity 20-25 min"; }
}

// Weekly diet plan
let weeklyMeals = [];

if(type === "veg"){
    weeklyMeals = [
        {day:"Mon", breakfast:"Oats 🥣", lunch:"Roti + Dal + Sabzi", dinner:"Salad 🥗 / Soup"},
        {day:"Tue", breakfast:"Poha", lunch:"Roti + Paneer Sabzi", dinner:"Vegetable Soup 🥦"},
        {day:"Wed", breakfast:"Upma", lunch:"Roti + Mixed Veg", dinner:"Salad 🥗"},
        {day:"Thu", breakfast:"Paratha", lunch:"Rajma + Rice", dinner:"Soup 🥣"},
        {day:"Fri", breakfast:"Idli 🟡", lunch:"Sambar + Rice", dinner:"Vegetable Salad 🥗"},
        {day:"Sat", breakfast:"Oats 🥣", lunch:"Veg Curry + Roti", dinner:"Soup 🥗"},
        {day:"Sun", breakfast:"Cheat Meal 🍩", lunch:"Cheat Meal 🍕", dinner:"Cheat Meal 🍔"},
    ];
}else{
    weeklyMeals = [
        {day:"Mon", breakfast:"Egg 🥚", lunch:"Chicken 🍗 + Rice", dinner:"Chicken Salad 🥗"},
        {day:"Tue", breakfast:"Omelette 🍳", lunch:"Fish 🐟 + Rice", dinner:"Soup 🥣"},
        {day:"Wed", breakfast:"Boiled Eggs 🥚", lunch:"Chicken Curry 🍗 + Roti", dinner:"Soup 🥗"},
        {day:"Thu", breakfast:"Egg Roll 🥚", lunch:"Fish 🐟 + Salad", dinner:"Soup 🥣"},
        {day:"Fri", breakfast:"Scrambled Eggs 🥚", lunch:"Chicken Salad 🥗", dinner:"Soup 🥣"},
        {day:"Sat", breakfast:"Egg + Rice 🥚", lunch:"Fish Curry 🐟 + Rice", dinner:"Chicken Soup 🥗"},
        {day:"Sun", breakfast:"Cheat Meal 🍩", lunch:"Cheat Meal 🍕", dinner:"Cheat Meal 🍔"},
    ];
}

// Highlight risky meals if Obese
let isRisk = colorClass === "bmi-risk";

// Result text
document.getElementById("result").innerHTML =
`Hey ${name} 👋

📊 BMI: <span class="${colorClass}">${bmi} (${category})</span>
💧 Water Intake: ${water} L/day ${waterEmoji}
🚶 Steps: ${steps}
🏋️ Exercise: ${exercise}`;

// Weekly table
let table = "<table><tr><th>Day</th><th>Breakfast</th><th>Lunch</th><th>Dinner</th></tr>";

for(let i=0;i<weeklyMeals.length;i++){
    table += `<tr>
        <td>${weeklyMeals[i].day}</td>
        <td${isRisk ? ' class="risky-meal"' : ''}>${weeklyMeals[i].breakfast}</td>
        <td${isRisk ? ' class="risky-meal"' : ''}>${weeklyMeals[i].lunch}</td>
        <td${isRisk ? ' class="risky-meal"' : ''}>${weeklyMeals[i].dinner}</td>
    </tr>`;
}

table += "</table>";
document.getElementById("weekly").innerHTML = table;

}
</script>

</body>
</html>
